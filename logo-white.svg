<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 115" width="440" height="115">
  <defs>
    <clipPath id="blueClip">
      <polygon points="49,17 86,62 49,109 12,62"/>
    </clipPath>
  </defs>

  <!-- ===== ICON ===== -->
  <!-- Dark background square -->
  <rect x="4" y="4" width="108" height="108" rx="4" fill="#2d2d2d"/>

  <!-- Blue diamond — lower-left -->
  <polygon points="49,17 86,62 49,109 12,62" fill="#2ba7df"/>

  <!-- White diamond — upper-right, overlapping blue -->
  <polygon points="71,8 108,54 71,101 34,54" fill="#ffffff"/>

  <!-- Small pale blue square inside blue crescent -->
  <rect x="14" y="69" width="17" height="17" fill="#b8cdd8" clip-path="url(#blueClip)"/>

  <!-- ===== FORTUNE TEXT ===== -->
  <text
    x="132" y="80"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="64"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-1">FORTUNE</text>

  <!-- ===== TILES AND PAVERS TEXT ===== -->
  <text
    x="136" y="100"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#94a3b8"
    letter-spacing="5.5">TILES AND PAVERS</text>
</svg>
