<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 115" width="440" height="115">

  <!-- ===== ICON SQUARE ===== -->
  <rect x="4" y="4" width="108" height="108" rx="9" fill="#2d2d2d"/>

  <!-- Blue rhombus (left, drawn first) -->
  <polygon points="56,10 90,58 56,106 22,58" fill="#2ba7df"/>

  <!-- White rhombus (right, larger — overlaps blue) -->
  <polygon points="70,6 108,58 70,110 32,58" fill="#ffffff"/>

  <!-- Small white square inside the blue crescent area -->
  <rect x="24" y="50" width="15" height="15" fill="#ffffff" rx="1"/>

  <!-- ===== FORTUNE TEXT (white for dark bg) ===== -->
  <text
    x="132" y="80"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="64"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-1">FORTUNE</text>

  <!-- ===== TILES AND PAVERS TEXT ===== -->
  <text
    x="136" y="100"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#94a3b8"
    letter-spacing="5.5">TILES AND PAVERS</text>
</svg>
