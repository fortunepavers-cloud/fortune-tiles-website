<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="squareMask">
      <rect width="200" height="200" rx="14"/>
    </clipPath>
  </defs>

  <!-- Dark background square -->
  <rect width="200" height="200" rx="14" fill="#333333"/>

  <g clip-path="url(#squareMask)">
    <!-- Blue diamond — back layer, center-left -->
    <polygon points="90,21 152,103 90,185 28,103" fill="#2ba7df"/>

    <!-- White diamond — front layer, offset upper-right, overlaps blue -->
    <polygon points="134,6 196,88 134,170 72,88" fill="#ffffff"/>

    <!-- Light blue small square — inside visible blue crescent -->
    <rect x="40" y="92" width="24" height="24" fill="#a8d8ec" rx="2"/>
  </g>

</svg>
