<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="blueDiamondClip">
      <polygon points="34,3 66,50 34,97 2,50"/>
    </clipPath>
  </defs>

  <!-- Blue diamond (back-left) -->
  <polygon points="34,3 66,50 34,97 2,50" fill="#1da8dc"/>

  <!-- White diamond (front-right, overlapping blue) -->
  <polygon points="66,3 98,50 66,97 34,50" fill="#ffffff"/>

  <!-- Small light blue square in visible blue crescent, clipped to diamond -->
  <rect x="4" y="54" width="20" height="20" fill="#88ceea" clip-path="url(#blueDiamondClip)"/>
</svg>
